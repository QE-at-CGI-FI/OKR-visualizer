<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKR Visualizer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>OKR Visualizer</h1>
            <div class="header-controls">
                <button id="add-objective-btn" class="btn btn-primary">+ Add Objective</button>
                <div class="file-controls">
                    <button id="export-btn" class="btn btn-secondary">Export Data</button>
                    <label for="import-file" class="btn btn-secondary">Import Data</label>
                    <input type="file" id="import-file" accept=".json" style="display: none;">
                    <button id="print-btn" class="btn btn-secondary">Print OKRs</button>
                    <button id="print-ppt-btn" class="btn btn-secondary">Print for PowerPoint</button>
                </div>
            </div>
        </header>

        <main class="main-content">

            <div id="objectives-container" class="objectives-container">
                <!-- Objectives will be dynamically added here -->
            </div>
        </main>
    </div>

    <!-- Modal for adding/editing objectives -->
    <div id="objective-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">Add Objective</h2>
            <form id="objective-form">
                <div class="form-group">
                    <label for="objective-title">Objective Title:</label>
                    <input type="text" id="objective-title" required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Save Objective</button>
                    <button type="button" class="btn btn-secondary" id="cancel-objective">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for adding/editing key results -->
    <div id="keyresult-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="kr-modal-title">Add Key Result</h2>
            <form id="keyresult-form">
                <div class="form-group">
                    <label for="keyresult-title">Key Result Title:</label>
                    <input type="text" id="keyresult-title" required>
                </div>
                <div class="form-group">
                    <label for="keyresult-status">Status:</label>
                    <select id="keyresult-status" required>
                        <option value="not-started">Not Started</option>
                        <option value="on-track">On Track</option>
                        <option value="behind">Behind</option>
                        <option value="at-risk">At Risk</option>
                        <option value="done">Done</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="keyresult-type">Type:</label>
                    <select id="keyresult-type" required>
                        <option value="DEL">DEL (Delivered Revenue)</option>
                        <option value="EXT">EXT (External Revenue)</option>
                        <option value="INV">INV (Investment to Future Revenue)</option>
                        <option value="EXT/DEL">EXT/DEL (External and Delivered Revenue)</option>
                    </select>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Save Key Result</button>
                    <button type="button" class="btn btn-secondary" id="cancel-keyresult">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/drag-drop.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
